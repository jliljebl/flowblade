name: Build AppImage

on:
  push:
    branches: [codex/appimage-release-ci-test]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Install build and runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adwaita-icon-theme \
            ca-certificates \
            curl \
            desktop-file-utils \
            ffmpeg \
            file \
            fontconfig-config \
            fonts-dejavu-core \
            frei0r-plugins \
            gmic \
            gir1.2-atk-1.0 \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-freedesktop \
            gir1.2-glib-2.0 \
            gir1.2-harfbuzz-0.0 \
            gir1.2-gtk-3.0 \
            gir1.2-pango-1.0 \
            hicolor-icon-theme \
            libasound2 \
            libcairo-gobject2 \
            libcairo2 \
            libcom-err2 \
            libdatrie1 \
            libdrm2 \
            libexpat1 \
            libfontconfig1 \
            libfreetype6 \
            libfribidi0 \
            libgbm1 \
            libfuse2 \
            libgdk-pixbuf2.0-bin \
            libglib2.0-bin \
            libglvnd0 \
            libgpg-error0 \
            libgraphite2-3 \
            libgtk-3-bin \
            libharfbuzz0b \
            libmlt-data \
            libopengl0 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libpangoft2-1.0-0 \
            libjpeg-turbo8 \
            libjbig0 \
            libjack-jackd2-0 \
            libpng16-16 \
            librsvg2-common \
            libthai0 \
            libtiff5 \
            libusb-1.0-0 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libwebp7 \
            libwebpdemux2 \
            libwebpmux3 \
            libxcb1 \
            libxkbcommon0 \
            python3 \
            python3-distutils \
            python3-gi \
            python3-gi-cairo \
            python3-mlt \
            python3-numpy \
            python3-pil \
            python3-setuptools \
            python3-usb1 \
            shared-mime-info \
            squashfs-tools \
            swh-plugins \
            xauth \
            xvfb \
            zlib1g

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowblade-appimage
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Smoke test AppImage startup
        run: packaging/appimage/smoke-test-appimage.sh

      - name: Upload AppImage smoke test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: flowblade-appimage-smoke-log
          path: build/appimage-smoke/*.log
          if-no-files-found: ignore

  container-smoke:
    name: Smoke (${{ matrix.name }})
    needs: appimage
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04
            image: ubuntu:22.04
            slug: ubuntu-22-04
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            slug: ubuntu-24-04
          - name: Debian 12
            image: debian:12
            slug: debian-12
          - name: Debian 13
            image: debian:13
            slug: debian-13
          - name: Fedora
            image: fedora:latest
            slug: fedora
          - name: Arch Linux
            image: archlinux:latest
            slug: archlinux
          - name: openSUSE Tumbleweed
            image: opensuse/tumbleweed:latest
            slug: opensuse-tumbleweed

    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Download AppImage artifact
        uses: actions/download-artifact@v7
        with:
          name: flowblade-appimage
          path: dist

      - name: Smoke test AppImage in ${{ matrix.name }}
        env:
          APPIMAGE_SMOKE_CONTAINER_IMAGES: ${{ matrix.image }}
        run: packaging/appimage/smoke-test-appimage-containers.sh

      - name: Upload AppImage smoke test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: flowblade-appimage-smoke-log-${{ matrix.slug }}
          path: build/appimage-smoke-containers/**/*.log
          if-no-files-found: ignore

  release:
    name: Attach AppImage to release
    needs:
      - appimage
      - container-smoke
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04

    steps:
      - name: Download AppImage artifact
        uses: actions/download-artifact@v7
        with:
          name: flowblade-appimage
          path: dist

      - name: Attach AppImage to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.AppImage --clobber
