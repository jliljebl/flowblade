name: Build AppImage

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    name: AppImage
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Check out sources
        uses: actions/checkout@v7

      - name: Install build and runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            adwaita-icon-theme \
            ca-certificates \
            curl \
            desktop-file-utils \
            ffmpeg \
            file \
            frei0r-plugins \
            gmic \
            gir1.2-atk-1.0 \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-freedesktop \
            gir1.2-glib-2.0 \
            gir1.2-harfbuzz-0.0 \
            gir1.2-gtk-3.0 \
            gir1.2-pango-1.0 \
            hicolor-icon-theme \
            libcairo-gobject2 \
            libcairo2 \
            libdatrie1 \
            libfontconfig1 \
            libfreetype6 \
            libfribidi0 \
            libfuse2 \
            libgdk-pixbuf2.0-bin \
            libglib2.0-bin \
            libgraphite2-3 \
            libgtk-3-bin \
            libharfbuzz0b \
            libmlt-data \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libpangoft2-1.0-0 \
            libjpeg-turbo8 \
            libjbig0 \
            libpng16-16 \
            librsvg2-common \
            libthai0 \
            libtiff5 \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libwebp7 \
            libwebpdemux2 \
            libwebpmux3 \
            libxkbcommon0 \
            python3 \
            python3-distutils \
            python3-gi \
            python3-gi-cairo \
            python3-mlt \
            python3-numpy \
            python3-pil \
            python3-setuptools \
            python3-usb1 \
            shared-mime-info \
            squashfs-tools \
            swh-plugins \
            xauth \
            xvfb \
            zlib1g

      - name: Build AppImage
        run: packaging/appimage/build-appimage.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: flowblade-appimage
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Smoke test AppImage startup
        run: packaging/appimage/smoke-test-appimage.sh

      - name: Smoke test AppImage in base containers
        run: packaging/appimage/smoke-test-appimage-containers.sh

      - name: Upload AppImage smoke test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: flowblade-appimage-smoke-log
          path: |
            build/appimage-smoke/*.log
            build/appimage-smoke-containers/**/*.log
          if-no-files-found: ignore

      - name: Attach AppImage to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.AppImage --clobber
